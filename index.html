<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .btn-login { padding: 10px 16px; }
  </style>
</head>
<body>

  <div>
    <h2 class="login-title">Acessar</h2>
    <button class="btn-login" id="btnLogin" type="button">Entrar</button>
  </div>

  <!-- Exemplos de modais (podem ou não existir) -->
  <div id="editModal"></div>
  <div id="importModal"></div>
  <div id="dbConfigModal"></div>
  <div id="settingsModal"></div>
  <div id="vendaModal"></div>

  <script>
    // Garante que o DOM foi carregado antes de acessar elementos
    document.addEventListener('DOMContentLoaded', () => {

      // ===== Botão Login =====
      const btn = document.getElementById('btnLogin');
      if (btn) {
        btn.addEventListener('click', () => {
          doLogin();
        });
      }

      // ===== Função de loading (segura) =====
      function showLoginLoading(show) {
        const el = document.getElementById('loginLoading');
        const btn = document.getElementById('btnLogin');

        if (el) el.style.display = show ? 'block' : 'none';
        if (btn) btn.disabled = show;
        if (show && el) el.textContent = '⏳ Verificando sessão...';
      }

      // ===== Tratamento seguro para modais =====
      const modals = ['editModal','importModal','dbConfigModal','settingsModal','vendaModal'];

      modals.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('click', function(e) {
            if (e.target === this) {
              closeById(id);
            }
          });
        }
      });

      function closeById(id) {
        console.log('Fechando modal:', id);
        // coloque aqui sua lógica real de fechamento
      }

      // ===== Função de login exemplo =====
      function doLogin() {
        showLoginLoading(true);
        setTimeout(() => {
          showLoginLoading(false);
          alert('Login executado com sucesso');
        }, 1000);
      }

    });
  </script>

</body>
</html>
